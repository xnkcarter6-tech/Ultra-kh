<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra KH - Workspace Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div class="bg-green-600 text-white text-[11px] font-bold tracking-wider uppercase py-2 text-center shadow-sm">
        ✔ PORTAL CORE SYSTEM ACTIVE V2 (AUTHENTICATED SESSION)
    </div>

    <div id="portal-screen" class="min-h-screen flex">
        <aside class="w-64 bg-blue-600 text-white flex flex-col justify-between p-4 shadow-lg shrink-0">
            <div>
                <h1 class="text-2xl font-bold mb-8 px-2 tracking-tight">Ultra KH</h1>
                <nav class="space-y-1" id="main-nav">
                    <button data-target="view-home" class="nav-btn w-full text-left block px-4 py-2.5 rounded bg-blue-700 font-semibold shadow-inner transition">🏠 Home Feed</button>
                    <button data-target="view-chat" class="nav-btn w-full text-left block px-4 py-2.5 rounded hover:bg-blue-700/50 transition">💬 Chat Hub</button>
                    <button data-target="view-profile" class="nav-btn w-full text-left block px-4 py-2.5 rounded hover:bg-blue-700/50 transition">👤 Edit Profile</button>
                    <button data-target="view-accounts" class="nav-btn w-full text-left block px-4 py-2.5 rounded hover:bg-blue-700/50 transition">🔑 Accounts</button>
                </nav>
            </div>
            <div class="text-xs opacity-75 border-t border-blue-500/30 pt-4 px-2 font-mono">
                Status: Connected Matrix
            </div>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto bg-gray-50 flex flex-col">
            <div id="alert-banner" style="display: none;" class="mb-4 p-4 text-white text-sm font-medium rounded-lg shadow-sm bg-gray-800"></div>
            
            <div id="view-home" class="content-view grid grid-cols-1 lg:grid-cols-3 gap-6">                                                
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200 self-start">
                    <h2 class="text-lg font-bold text-gray-900 mb-4 tracking-tight">Publish an Update</h2>
                    <textarea id="update-text" rows="4" placeholder="Type your broadcast update here..." class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50 resize-none transition text-sm"></textarea>
                    <button id="btn-publish" class="mt-3 px-6 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition shadow-sm">Publish Post</button>
                    
                    <h2 class="text-lg font-bold text-gray-900 mt-8 mb-4 tracking-tight border-t border-gray-100 pt-6">Workspace Broadcast Feed</h2>
                    <div id="feed-container" class="space-y-4">
                        </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="font-bold text-gray-900 mb-1 text-sm tracking-tight">Welcome to Ultra KH 🚀</h3>
                        <p class="text-xs text-gray-500 leading-relaxed">Welcome to our official platform tracker feed updates.</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="font-bold text-gray-900 mb-3 text-sm tracking-tight">System Connection Status</h3>
                        <div id="connection-status" class="text-xs flex items-center gap-2 text-green-700 font-semibold bg-green-50 px-3 py-2 rounded-lg border border-green-100">
                            <span class="h-2 w-2 rounded-full bg-green-500"></span>
                            Connected Live Cloud
                        </div>
                    </div>                                                
                </div>
            </div>

            <div id="view-chat" class="content-view hidden flex-1 max-w-5xl w-full mx-auto flex gap-4 h-[600px]">
                <div class="w-64 bg-white border border-gray-200 rounded-2
