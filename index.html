<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra KH - Workspace Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .sidebar { background-color: #2563eb; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div id="workspace-screen" class="min-h-screen flex">
        <aside class="w-64 sidebar text-white flex flex-col justify-between p-4 shadow-lg">
            <div>
                <h1 class="text-2xl font-bold mb-8 px-2">Ultra KH</h1>
                <nav class="space-y-2">
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700 font-semibold bg-blue-800">🏠 Home</a>
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700">💬 Chat</a>
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700">👤 Profile</a>
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700">🔑 Accounts</a>
                </nav>
            </div>
            <div class="text-xs opacity-70 px-2">Operator Panel Active</div>
        </aside>

        <main class="flex-1 p-6 relative">
            <div id="alert-banner" style="display: none;" class="mb-4 p-4 text-white text-sm font-medium rounded-lg shadow-sm transition bg-red-500"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">                
                <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4">Publish an Update</h2>
                    <textarea id="update-text" rows="5" placeholder="Type your broadcast update here..." class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                    <button id="btn-publish" class="mt-4 px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition">Publish Post</button>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-900 mb-2">Welcome to Ultra KH 🚀</h3>
                        <p class="text-sm text-gray-500">Welcome to our official platform tracker feed updates.</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-900 mb-4">System Connection Status</h3>
                        <div id="connection-status" class="text-sm flex items-center gap-2 text-amber-600 font-medium">
                            <span class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></span>
                            Syncing Live Cloud...
                        </div>
                    </div>                
                </div>

                <div class="lg:col-span-3 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4">Workspace Broadcast Feed</h2>
                    <div id="feed-container" class="text-sm text-gray-400 text-center py-8 border border-dashed border-gray-100 rounded-lg">
                        Syncing latest workspace updates...
                    </div>
                </div>            
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Verified working credentials directly from your console
        const firebaseConfig = {            
            apiKey: "AIzaSyC7L_QlM3o7BkUDZSACRsxzJuSqXdXb2c8",            
            authDomain: "ultra-kh.firebaseapp.com",            
            databaseURL: "https://ultra-kh-default-rtdb.firebaseio.com",            
            projectId: "ultra-kh",            
            storageBucket: "ultra-kh.firebasestorage.app",            
            messagingSenderId: "414518365494",            
            appId: "1:414518365494:web:accf5fa772831d1459b797",            
            measurementId: "G-6RXJMQF7HZ"        
        };

        const app = initializeApp(firebaseConfig);        
        const db = getDatabase(app);

        const alertBanner = document.getElementById('alert-banner');
        const updateTextArea = document.getElementById('update-text');
        const connectionStatus = document.getElementById('connection-status');        
        const feedContainer = document.getElementById('feed-container');
        const btnPublish = document.getElementById('btn-publish');

        // Targets your open rule path node directly
        const databaseFeedRef = ref(db, 'feed');

        function displayAlert(msg, errorMode = true) {            
            if (!msg) {                
                alertBanner.style.display = 'none';                
                return;            
            }            
            alertBanner.className = `mb-4 p-4 text-white text-sm font-medium rounded-lg shadow-sm transition ${errorMode ? 'bg-red-500' : 'bg-gray-800'}`;            
            alertBanner.textContent = msg;            
            alertBanner.style.display = 'block';        
        }

        // Live Connection Sync Verification
        const connectedRef = ref(db, ".info/connected");            
        onValue(connectedRef, (snap) => {                
            if (snap.val() === true) {                    
                connectionStatus.className = "text-sm flex items-center gap-2 text-green-600 font-medium";                    
                connectionStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-500"></span> Connected Live Cloud`;                
            } else {                    
                connectionStatus.className = "text-sm flex items-center gap-2 text-amber-600 font-medium";                    
                connectionStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></span> Syncing Live Cloud...`;                
            }            
        });

        // Pull database feeds instantly onto workspace card
        onValue(databaseFeedRef, (snapshot) => {            
            if (!snapshot.exists()) {                
                feedContainer.className = "text-sm text-gray-400 text-center py-8 border border-dashed border-gray-100 rounded-lg";                
                feedContainer.textContent = "No broadcast updates posted yet.";                
                return;            
            }

            let htmlPayload = `<div class="space-y-4">`;            
            const records = snapshot.val();                            
            Object.keys(records).reverse().forEach(key => {                
                const row = records[key];                
                const timestampLabel = row.timestamp ? new Date(row.timestamp).toLocaleString() : 'Recent';                
                htmlPayload += `                    
                    <div class="p-4 bg-gray-50 rounded-lg border border-gray-200 text-left">                        
                        <p class="text-gray-800 font-normal break-words">${row.text || ''}</p>                        
                        <span class="text-xs text-gray-400 block mt-2">${timestampLabel}</span>                    
                    </div>                
                `;            
            });            
            htmlPayload += `</div>`;                            
            feedContainer.className = "block";            
            feedContainer.innerHTML = htmlPayload;        
        }, (err) => {            
            feedContainer.className = "text-sm text-red-500 text-center py-8 font-medium";            
            feedContainer.textContent = `Database syncing error: ${err.message}`;        
        });

        // Handle text feed postings
        btnPublish.addEventListener('click', async () => {            
            const bodyContent = updateTextArea.value.trim();            
            if (!bodyContent) return displayAlert("Cannot process empty text posts.");

            btnPublish.disabled = true;            
            btnPublish.textContent = "Publishing...";            
            displayAlert(null);

            try {                
                await push(databaseFeedRef, {                    
                    text: bodyContent,                    
                    timestamp: serverTimestamp()                
                });                
                updateTextArea.value = "";                
                displayAlert("Post broadcast updated successfully.", false);            
            } catch (err) {                
                console.error(err);                
                displayAlert(`Broadcast Fail: ${err.message}`, true);            
            } finally {                
                btnPublish.disabled = false;                
                btnPublish.textContent = "Publish Post";            
            }        
        });    
    </script>
</body>
</html>
