<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra KH Telegram Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2ff;
}

/* TOP BAR */
.top{
  background:#1E50FF;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* LAYOUT */
.container{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#1E50FF;
  color:white;
  padding:10px;
}

.user{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.user:hover{
  background:#143fd1;
}

/* CHAT AREA */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  background:#dbeafe;
  padding:8px;
  margin:6px;
  border-radius:8px;
  max-width:60%;
}

.me{
  background:#1E50FF;
  color:white;
  margin-left:auto;
  text-align:right;
}

/* INPUT */
.inputBox{
  display:flex;
  padding:10px;
  gap:10px;
}

input,button{
  padding:10px;
  width:100%;
  border-radius:6px;
  border:none;
}

button{
  background:#1E50FF;
  color:white;
  cursor:pointer;
}

/* AUTH */
.auth{
  width:300px;
  margin:100px auto;
  background:white;
  padding:15px;
  border-radius:10px;
}

.hidden{display:none}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column}
  .sidebar{width:100%;display:flex;overflow:auto}
  .user{flex:1;text-align:center}
}
</style>
</head>

<body>

<div class="top">
  <div>Ultra KH Telegram Pro</div>
  <div id="me"></div>
</div>

<!-- AUTH -->
<div id="auth" class="auth">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Register</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

  <!-- USERS -->
  <div class="sidebar">
    <h3>Online Users</h3>
    <div id="users"></div>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CHAT -->
  <div class="main">

    <div id="chatBox" class="chatBox"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Message...">
      <button onclick="send()">Send</button>
    </div>

  </div>
</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ELEMENTS */
const email = document.getElementById("email");
const pass = document.getElementById("pass");
const msg = document.getElementById("msg");

const chatBox = document.getElementById("chatBox");
const usersBox = document.getElementById("users");
const me = document.getElementById("me");

/* STATE */
let currentUser = null;
let activeChat = "global";

/* ================= AUTH ================= */

function signup(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user.email;
    me.innerText = currentUser;

    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    setOnline();
    loadUsers();
    listenMessages();
  } else {
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

/* ================= ONLINE USERS ================= */

function setOnline(){
  db.collection("users").doc(currentUser).set({
    email: currentUser,
    online: true
  });
}

function loadUsers(){
  db.collection("users")
  .onSnapshot(snap=>{
    usersBox.innerHTML="";
    snap.forEach(u=>{
      let d=u.data();

      let div=document.createElement("div");
      div.className="user";
      div.innerText=d.email;
      div.onclick=()=>openChat(d.email);

      usersBox.appendChild(div);
    });
  });
}

function openChat(user){
  activeChat = user;
  chatBox.innerHTML="";
}

/* ================= CHAT ================= */

function send(){
  if(!msg.value) return;

  db.collection("messages").add({
    from: currentUser,
    to: activeChat,
    text: msg.value,
    time: Date.now()
  });

  msg.value="";
}

function listenMessages(){
  db.collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    chatBox.innerHTML="";

    snap.forEach(doc=>{
      let d = doc.data();

      if(d.to !== activeChat && d.to !== "global") return;

      let div=document.createElement("div");
      div.className="msg "+(d.from===currentUser?"me":"");

      div.innerText = d.from + ": " + d.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

</script>

</body>
</html>
