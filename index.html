<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra KH - Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .sidebar { background-color: #2563eb; }
        .error-banner { background-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex min-h-screen">
        <aside class="w-64 sidebar text-white flex flex-col justify-between p-4">
            <div>
                <h1 class="text-2xl font-bold mb-8 px-2">Ultra KH</h1>
                <nav class="space-y-2">
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700">🏠 Home</a>
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700">💬 Chat</a>
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700">👤 Profile</a>
                    <a href="#" class="block px-4 py-2 rounded hover:bg-blue-700 font-semibold bg-blue-800">🔑 Accounts</a>
                </nav>
            </div>
            <div class="text-xs opacity-70 px-2">Dashboard / Workspace</div>
        </aside>

        <main class="flex-1 p-6 relative">
            <div id="notification-zone" class="absolute top-4 right-4 z-50 space-y-2 w-96"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4">Publish an Update</h2>
                    <textarea id="update-text" rows="5" placeholder="Write your update details here..." class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                    <button id="btn-publish" class="mt-4 px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition">Publish Post</button>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                        <h3 class="font-bold flex items-center gap-2 text-gray-900 mb-2">Welcome to Ultra KH 🚀</h3>
                        <p class="text-sm text-gray-500">Welcome to our official platform tracker feed updates.</p>
                    </div>

                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-900 mb-4">System Connection Status</h3>
                        <div id="connection-status" class="text-sm flex items-center gap-2 text-amber-600 font-medium">
                            <span class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></span>
                            Connecting to System...
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-3 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4">Workspace Broadcast Feed</h2>
                    <div id="feed-container" class="text-sm text-gray-400 text-center py-8">
                        Syncing latest workspace updates...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Verified Configuration block
        const firebaseConfig = {
            apiKey: "AIzaSyC7L_QlM3o7BkUDZSACRsxzJuSqXdXb2c8",
            authDomain: "ultra-kh.firebaseapp.com",
            databaseURL: "https://ultra-kh-default-rtdb.firebaseio.com",
            projectId: "ultra-kh",
            storageBucket: "ultra-kh.firebasestorage.app",
            messagingSenderId: "414518365494",
            appId: "1:414518365494:web:accf5fa772831d1459b797",
            measurementId: "G-6RXJMQF7HZ"
        };

        // Initialize App & Database instances
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI Element References
        const btnPublish = document.getElementById('btn-publish');
        const updateTextArea = document.getElementById('update-text');
        const feedContainer = document.getElementById('feed-container');
        const connectionStatus = document.getElementById('connection-status');
        const notificationZone = document.getElementById('notification-zone');

        // Helper for displaying native notifications matching UI
        function showNotification(message, isError = false) {
            const banner = document.createElement('div');
            banner.className = `p-3 text-sm text-white font-medium rounded shadow-md ${isError ? 'bg-red-500' : 'bg-gray-800'}`;
            banner.textContent = message;
            notificationZone.appendChild(banner);
            setTimeout(() => banner.remove(), 4000);
        }

        // Monitor Realtime Database Connection state
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                connectionStatus.className = "text-sm flex items-center gap-2 text-green-600 font-medium";
                connectionStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-500"></span> Connected Live Cloud`;
            } else {
                connectionStatus.className = "text-sm flex items-center gap-2 text-amber-600 font-medium";
                connectionStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></span> Syncing Live Cloud...`;
            }
        });

        // FIXED: Targeted path explicitly changed from 'broadcast' to 'feed' to match your rules JSON
        const databaseFeedRef = ref(db, 'feed');

        // Handle Form Submissions
        btnPublish.addEventListener('click', async () => {
            const content = updateTextArea.value.trim();
            if (!content) {
                showNotification("Please type a status message before pushing.", true);
                return;
            }

            btnPublish.disabled = true;
            btnPublish.textContent = "Publishing...";

            try {
                await push(databaseFeedRef, {
                    text: content,
                    timestamp: serverTimestamp()
                });
                updateTextArea.value = "";
                showNotification("Post broadcast updated successfully.");
            } catch (error) {
                console.error(error);
                // Displays the specific permission error string if data formatting goes out of bounds
                showNotification(`Broadcast Fail: ${error.message}`, true);
            } finally {
                btnPublish.disabled = false;
                btnPublish.textContent = "Publish Post";
            }
        });

        // Stream modifications down into the workspace container UI
        onValue(databaseFeedRef, (snapshot) => {
            if (!snapshot.exists()) {
                feedContainer.className = "text-sm text-gray-400 text-center py-8";
                feedContainer.textContent = "No broadcast updates posted yet.";
                return;
            }

            let htmlPayload = `<div class="space-y-4">`;
            const data = snapshot.val();
            
            // Loop through entries chronologically reverse
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const dateString = item.timestamp ? new Date(item.timestamp).toLocaleString() : 'Recent';
                htmlPayload += `
                    <div class="p-4 bg-gray-50 rounded-lg border border-gray-100">
                        <p class="text-gray-800 font-normal break-words">${item.text}</p>
                        <span class="text-xs text-gray-400 block mt-2">${dateString}</span>
                    </div>
                `;
            });
            htmlPayload += `</div>`;
            
            feedContainer.className = "text-left";
            feedContainer.innerHTML = htmlPayload;
        }, (error) => {
            feedContainer.className = "text-sm text-red-500 text-center py-8";
            feedContainer.textContent = `Failed to read workspace tracker feed: ${error.message}`;
        });
    </script>
</body>
</html>
