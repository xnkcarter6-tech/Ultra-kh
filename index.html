<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra KH — Next Gen Social Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f7faf8; 
            --bg-card: #ffffff; 
            --bg-input: #edf2f0; 
            --border-subtle: rgba(22, 66, 55, 0.08); 
            --border-active: rgba(22, 66, 55, 0.2);
            --text-primary: #122622; 
            --text-secondary: #5a736e; 
            --accent-glow: #1b5e4f; 
            --error-red: #c14747;
            --font-stack: 'Plus Jakarta Sans', 'Hanuman', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack);
            letter-spacing: -0.01em;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #edf5f2 0%, var(--bg-main) 80%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-shell {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: transparent;
            position: relative;
        }

        /* --- SIDE NAVIGATION --- */
        .sidebar-nav {
            width: 240px;
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            justify-content: space-between;
            background: rgba(247, 250, 248, 0.6);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .brand-cluster {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 22px;
            color: var(--text-primary);
            text-decoration: none;
            padding-left: 8px;
        }

        .brand-logo-box {
            background: var(--accent-glow);
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(27, 94, 79, 0.2);
        }

        .nav-links-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: -100px;
        }

        .nav-pill {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-pill i {
            margin-right: 14px;
            font-size: 18px;
        }

        .nav-pill:hover, .nav-pill.active {
            color: var(--text-primary);
            background: var(--bg-card);
            box-shadow: 0 4px 12px rgba(22, 66, 55, 0.03);
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .lang-btn {
            flex: 1;
            padding: 6px;
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .lang-btn.active {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .user-footer-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-widget {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .user-widget:hover {
            background: var(--bg-card);
            border-color: var(--border-subtle);
        }

        .avatar-smooth {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #cbdad5;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .btn-signout {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(193, 71, 71, 0.1);
            background: rgba(193, 71, 71, 0.04);
            color: var(--error-red);
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-signout:hover {
            background: var(--error-red);
            color: #ffffff;
        }

        /* --- WORKSPACE VIEW SHEETS --- */
        .workspace-timeline {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .workspace-top-bar {
            height: 72px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .view-label {
            font-size: 16px;
            font-weight: 600;
        }

        .scroll-canvas {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        /* Make message sheet expand to use full width gracefully */
        .scroll-canvas.wide-layout {
            max-width: 100% !important;
            padding: 0 !important;
        }

        .view-sheet {
            display: none;
            height: 100%;
        }

        .view-sheet.active {
            display: block;
        }

        /* --- COMPOSER & CARDS --- */
        .canvas-composer {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            border: 1px solid var(--border-subtle);
        }

        .interactive-text-box {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            padding-top: 8px;
        }

        .composer-bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .btn-premium-action {
            background: var(--accent-glow);
            color: #ffffff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .stream-card-node {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-subtle);
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .node-user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .node-user-handle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .body-narrative-block {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .empty-placeholder-card {
            background: rgba(255,255,255,0.5);
            border: 1px dashed var(--border-subtle);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
        }

        /* --- SPLIT MESSAGES WORKSPACE --- */
        .chat-split-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 72px);
            background: var(--bg-main);
        }

        .chat-users-panel {
            width: 280px;
            border-right: 1px solid var(--border-subtle);
            background: rgba(255, 255, 255, 0.4);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .panel-search-header {
            padding: 16px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .user-session-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(22, 66, 55, 0.03);
            transition: background 0.2s;
        }

        .user-session-row:hover, .user-session-row.active {
            background: var(--bg-card);
        }

        .user-session-row .session-name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-session-row .session-handle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chat-window-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
        }

        .chat-messages-stream {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble-node {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14.5px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-bubble-node.incoming {
            background: var(--bg-input);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-bubble-node.outgoing {
            background: var(--accent-glow);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            gap: 12px;
            align-items: center;
            background: #ffffff;
        }

        .chat-input-field {
            flex: 1;
            background: var(--bg-input);
            border: none;
            outline: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
        }

        .btn-send-message {
            background: var(--accent-glow);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        .btn-send-message:hover {
            opacity: 0.9;
        }

        /* --- AUTH MODAL SYSTEM --- */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(18, 38, 34, 0.3);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .auth-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .auth-modal {
            background: var(--bg-card);
            width: 400px;
            padding: 36px;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 20px 40px rgba(22, 66, 55, 0.1);
            position: relative;
        }

        .close-auth {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 18px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid var(--bg-input);
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding-bottom: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .auth-tab.active {
            color: var(--accent-glow);
            border-bottom: 2px solid var(--accent-glow);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .input-group input {
            background: var(--bg-input);
            border: 1px solid transparent;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
        }

        .auth-btn {
            background: var(--accent-glow);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav class="sidebar-nav">
            <div>
                <a href="#" class="brand-cluster" style="margin-bottom: 30px;" onclick="navigateToSheet('home')">
                    <div class="brand-logo-box">Uᴷᴴ</div>
                    Ultra KH
                </a>
                <div class="lang-switcher">
                    <button class="lang-btn active" id="btn-en" onclick="switchLang('en')">EN</button>
                    <button class="lang-btn" id="btn-kh" onclick="switchLang('kh')">ខ្មែរ</button>
                </div>
            </div>
            
            <div class="nav-links-stack">
                <div class="nav-pill active" id="nav-home" onclick="navigateToSheet('home')"><i class="fa-solid fa-house-laptop"></i> <span data-key="nav-home">Home</span></div>
                <div class="nav-pill" id="nav-messages" onclick="navigateToSheet('messages')"><i class="fa-solid fa-comment-dots"></i> <span data-key="nav-msg">Messages</span></div>
                <div class="nav-pill" id="nav-profile" onclick="navigateToSheet('profile')"><i class="fa-solid fa-people-roof"></i> <span data-key="nav-profile">Profile</span></div>
            </div>

            <div class="user-footer-wrapper">
                <div class="user-widget" id="userAccountWidget" onclick="handleWidgetClick()">
                    <div class="avatar-smooth" id="userAvatarContainer">
                        <i class="fa-solid fa-user" id="guestAvatarIcon" style="color: var(--accent-glow)"></i>
                    </div>
                    <div class="user-meta-info">
                        <span class="profile-name" id="profileNameDisplay" data-key="user-status-guest">Guest Account</span>
                        <span class="profile-handle" id="profileHandleDisplay" data-key="user-action-guest">Click to Sign In</span>
                    </div>
                </div>
                <button class="btn-signout" id="btnSignout" onclick="executeSignOut()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span data-key="btn-logout">Sign Out</span>
                </button>
            </div>
        </nav>

        <main class="workspace-timeline">
            <div class="workspace-top-bar">
                <span class="view-label" id="currentViewTitle" data-key="feed-title">Discover Feed</span>
            </div>

            <div class="scroll-canvas" id="mainScrollCanvas">
                
                <div id="sheet-home" class="view-sheet active">
                    <div class="canvas-composer">
                        <textarea class="interactive-text-box" id="composer-text" placeholder="What ideas are you designing today?" rows="2"></textarea>
                        <div class="composer-bottom-bar">
                            <div></div>
                            <button class="btn-premium-action" onclick="executePublishPost()" data-key="btn-publish">Publish</button>
                        </div>
                    </div>
                    <div id="postsContainer"></div>
                </div>

                <div id="sheet-messages" class="view-sheet">
                    <div class="chat-split-container">
                        <div class="chat-users-panel">
                            <div class="panel-search-header" data-key="panel-members-title">Active Members</div>
                            <div id="chatUsersListContainer"></div>
                        </div>

                        <div class="chat-window-pane">
                            <div class="chat-messages-stream" id="chatMessagesStream">
                                <div class="empty-placeholder-card" style="margin: auto; border: none;" id="chatWindowPlaceholder">
                                    <i class="fa-regular fa-comments" style="font-size: 32px; margin-bottom: 12px; color: var(--accent-glow)"></i>
                                    <p data-key="msg-empty">Select an active member to securely chat.</p>
                                </div>
                            </div>
                            <div class="chat-input-footer">
                                <input type="text" class="chat-input-field" id="chatInputField" placeholder="Type a secure message..." disabled>
                                <button class="btn-send-message" id="btnSendMessage" onclick="executeSendDirectMessage()" disabled><i class="fa-solid fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="sheet-profile" class="view-sheet">
                    <div class="empty-placeholder-card" style="text-align: left;">
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                            <div class="avatar-smooth" id="sheetProfileAvatar" style="width: 64px; height: 64px; font-size: 24px;"><i class="fa-solid fa-user"></i></div>
                            <div>
                                <h2 id="sheetProfileName">Guest User</h2>
                                <p id="sheetProfileHandle" style="color: var(--text-secondary)">@guest</p>
                            </div>
                        </div>
                        <p style="border-top: 1px solid var(--border-subtle); padding-top: 15px;" data-key="profile-empty">Sign in to view your complete digital profile insights.</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-modal">
            <button class="close-auth" onclick="closeAuthModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabSignin" onclick="toggleAuthTab('signin')" data-key="tab-signin">Sign In</div>
                <div class="auth-tab" id="tabSignup" onclick="toggleAuthTab('signup')" data-key="tab-signup">Sign Up</div>
            </div>

            <form class="auth-form active" id="formSignin" onsubmit="executeSignIn(event)">
                <div class="input-group"><label data-key="lbl-email">Email Address</label><input type="email" id="loginEmail" required></div>
                <div class="input-group"><label data-key="lbl-password">Password</label><input type="password" id="loginPassword" required></div>
                <button class="auth-btn" type="submit" data-key="btn-signin">Sign In</button>
            </form>

            <form class="auth-form" id="formSignup" onsubmit="executeSignUp(event)">
                <div class="input-group"><label data-key="lbl-name">Full Name</label><input type="text" id="signUpName" required></div>
                <div class="input-group"><label data-key="lbl-email">Email Address</label><input type="email" id="signUpEmail" required></div>
                <div class="input-group"><label data-key="lbl-password">Password</label><input type="password" id="signUpPassword" required></div>
                <button class="auth-btn" type="submit" data-key="btn-signup">Create Account</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7L_QlM3o7BkUDZSACRsxzJuSqXdXb2c8",
            authDomain: "ultra-kh.firebaseapp.com",
            databaseURL: "https://ultra-kh-default-rtdb.firebaseio.com",
            projectId: "ultra-kh",
            storageBucket: "ultra-kh.firebasestorage.app",
            messagingSenderId: "414518365494",
            appId: "1:414518365494:web:accf5fa772831d1459b797",
            measurementId: "G-6RXJMQF7HZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUserObject = null;
        let selectedReceiverId = null;
        let currentMessagesListenerRef = null;

        // Monitor Account States Securely
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserObject = user;
                isLoggedIn = true;
                activeUser.name = user.displayName || "Member";
                activeUser.handle = "@" + (user.displayName || "user").toLowerCase().replace(/\s+/g, '');
                
                // Write/Sync user profile index node in database so others can chat with them
                set(ref(db, 'users/' + user.uid), {
                    uid: user.uid,
                    displayName: activeUser.name,
                    handle: activeUser.handle
                });
                
                loadActiveMembersPanel();
            } else {
                currentUserObject = null;
                isLoggedIn = false;
                activeUser.name = '';
                activeUser.handle = '';
                selectedReceiverId = null;
                document.getElementById('chatUsersListContainer').innerHTML = '';
                resetChatPane();
            }
            updateProfileUIState();
        });

        // Sign Up Controller
        window.executeSignUp = async (e) => {
            e.preventDefault();
            const name = document.getElementById('signUpName').value;
            const email = document.getElementById('signUpEmail').value;
            const password = document.getElementById('signUpPassword').value;

            try {
                const credential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(credential.user, { displayName: name });
                closeAuthModal();
            } catch (err) {
                alert("Sign Up Error: " + err.message);
            }
        };

        // Sign In Controller
        window.executeSignIn = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                closeAuthModal();
            } catch (err) {
                alert("Sign In Error: " + err.message);
            }
        };

        // Sign Out Controller
        window.executeSignOut = async () => {
            try {
                await signOut(auth);
                navigateToSheet('home');
            } catch (err) {
                alert(err.message);
            }
        };

        // Database Write Post Controller
        window.executePublishPost = async () => {
            if (!currentUserObject) {
                openAuthModal();
                return;
            }
            const postText = document.getElementById('composer-text').value.trim();
            if (!postText) return;

            try {
                await push(ref(db, 'posts'), {
                    body: postText,
                    author: currentUserObject.displayName || "Member",
                    handle: "@" + (currentUserObject.displayName || "user").toLowerCase().replace(/\s+/g, ''),
                    timestamp: serverTimestamp()
                });
                document.getElementById('composer-text').value = '';
            } catch (err) {
                alert("Database write rejected! Info: " + err.message);
            }
        };

        // Live Database Listener for Feed
        onValue(ref(db, 'posts'), (snapshot) => {
            const container = document.getElementById('postsContainer');
            container.innerHTML = '';
            const data = snapshot.val();
            if (!data) {
                container.innerHTML = `<div class="empty-placeholder-card">No posts yet. Be the first to write something!</div>`;
                return;
            }

            const linearArray = Object.values(data).reverse();
            linearArray.forEach(post => {
                const card = document.createElement('div');
                card.className = 'stream-card-node';
                card.innerHTML = `
                    <div class="node-header">
                        <div class="avatar-smooth" style="width:28px; height:28px; font-size:11px; background:#cbdad5;"><i class="fa-solid fa-user"></i></div>
                        <div>
                            <div class="node-user-name">${post.author}</div>
                            <div class="node-user-handle">${post.handle}</div>
                        </div>
                    </div>
                    <div class="body-narrative-block">${post.body}</div>
                `;
                container.appendChild(card);
            });
        });

        // Load Real-time User List for Messages Layout Panel
        function loadActiveMembersPanel() {
            onValue(ref(db, 'users'), (snapshot) => {
                const container = document.getElementById('chatUsersListContainer');
                container.innerHTML = '';
                const users = snapshot.val();
                if (!users) return;

                Object.values(users).forEach(user => {
                    // Skip showing yourself in the DM directory list
                    if (currentUserObject && user.uid === currentUserObject.uid) return;

                    const row = document.createElement('div');
                    row.className = `user-session-row ${selectedReceiverId === user.uid ? 'active' : ''}`;
                    row.id = `user-row-${user.uid}`;
                    row.innerHTML = `
                        <div class="avatar-smooth" style="width:32px; height:32px; font-size:12px;"><i class="fa-solid fa-user"></i></div>
                        <div>
                            <div class="session-name">${user.displayName}</div>
                            <div class="session-handle">${user.handle}</div>
                        </div>
                    `;
                    row.onclick = () => startPrivateChatSession(user.uid);
                    container.appendChild(row);
                });
            });
        }

        // Initialize Messaging Channel Window Between 2 Users
        function startPrivateChatSession(receiverId) {
            if (!currentUserObject) return;
            selectedReceiverId = receiverId;

            // Update UI Active row selection colors
            document.querySelectorAll('.user-session-row').forEach(r => r.classList.remove('active'));
            const activeRow = document.getElementById(`user-row-${receiverId}`);
            if (activeRow) activeRow.classList.add('active');

            // Unfreeze form input elements 
            document.getElementById('chatInputField').disabled = false;
            document.getElementById('btnSendMessage').disabled = false;
            document.getElementById('chatInputField').focus();

            // Clear old streams before loading new updates
            const stream = document.getElementById('chatMessagesStream');
            stream.innerHTML = '';

            // Compute deterministic Chat Room Path String (UID_UID sorted alphabetically)
            const chatRoomId = currentUserObject.uid < receiverId 
                ? `${currentUserObject.uid}_${receiverId}` 
                : `${receiverId}_${currentUserObject.uid}`;

            // Sync with Chat Session Stream Node Reference
            if (currentMessagesListenerRef) {
                // detach previous live session hooks
            }

            onValue(ref(db, `messages/${chatRoomId}`), (snapshot) => {
                stream.innerHTML = '';
                const data = snapshot.val();
                
                if (!data) {
                    stream.innerHTML = `
                        <div class="empty-placeholder-card" style="margin: auto; border: none;">
                            <p data-key="chat-new-start">Say hello! Secure conversation started.</p>
                        </div>`;
                    return;
                }

                Object.values(data).forEach(msg => {
                    const bubble = document.createElement('div');
                    const isMe = msg.senderId === currentUserObject.uid;
                    bubble.className = `msg-bubble-node ${isMe ? 'outgoing' : 'incoming'}`;
                    bubble.textContent = msg.text;
                    stream.appendChild(bubble);
                });

                // Smooth Scroll down to latest chat bubble node element
                stream.scrollTop = stream.scrollHeight;
            });
        }

        // Dispatch Message Payload Event
        window.executeSendDirectMessage = async () => {
            const input = document.getElementById('chatInputField');
            const messageText = input.value.trim();
            if (!messageText || !currentUserObject || !selectedReceiverId) return;

            const chatRoomId = currentUserObject.uid < selectedReceiverId 
                ? `${currentUserObject.uid}_${selectedReceiverId}` 
                : `${selectedReceiverId}_${currentUserObject.uid}`;

            try {
                await push(ref(db, `messages/${chatRoomId}`), {
                    senderId: currentUserObject.uid,
                    receiverId: selectedReceiverId,
                    text: messageText,
                    timestamp: serverTimestamp()
                });
                input.value = '';
            } catch (err) {
                alert("Message dispatch failed: " + err.message);
            }
        };

        // Fire message submission on hitting enter key
        document.getElementById('chatInputField').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') executeSendDirectMessage();
        });

        function resetChatPane() {
            document.getElementById('chatInputField').disabled = true;
            document.getElementById('chatInputField').value = '';
            document.getElementById('btnSendMessage').disabled = true;
            document.getElementById('chatMessagesStream').innerHTML = `
                <div class="empty-placeholder-card" style="margin: auto; border: none;" id="chatWindowPlaceholder">
                    <i class="fa-regular fa-comments" style="font-size: 32px; margin-bottom: 12px; color: var(--accent-glow)"></i>
                    <p data-key="msg-empty">Select an active member to securely chat.</p>
                </div>`;
        }
    </script>

    <script>
        let currentLang = 'en';
        let isLoggedIn = false;
        let activeUser = { name: '', handle: '' };

        const langData = {
            en: {
                "nav-home": "Home", "nav-msg": "Messages", "nav-profile": "Profile",
                "user-status-guest": "Guest Account", "user-action-guest": "Click to Sign In",
                "feed-title": "Discover Feed", "btn-publish": "Publish", "btn-logout": "Sign Out",
                "tab-signin": "Sign In", "tab-signup": "Sign Up", "lbl-email": "Email Address",
                "lbl-password": "Password", "lbl-name": "Full Name", "btn-signin": "Sign In", "btn-signup": "Create Account",
                "view-msg-title": "Messages Workspace", "view-profile-title": "Account Profile Overview",
                "msg-empty": "Select an active member to securely chat.",
                "profile-empty": "Sign in to view your complete digital profile insights.",
                "panel-members-title": "Active Members"
            },
            kh: {
                "nav-home": "ទំព័រដើម", "nav-msg": "សារកម្សាន្ត", "nav-profile": "ប្រវត្តិរូប",
                "user-status-guest": "គណនីភ្ញៀវ", "user-action-guest": "ចុចទីនេះដើម្បីចូលប្រព័ន្ធ",
                "feed-title": "ព័ត៌មានថ្មីៗ", "btn-publish": "ផ្សព្វផ្សាយ", "btn-logout": "ចាកចេញ",
                "tab-signin": "ចូលប្រព័ន្ធ", "tab-signup": "ចុះឈ្មោះ", "lbl-email": "អាសយដ្ឋានអ៊ីមែល",
                "lbl-password": "លេខកូដសម្ងាត់", "lbl-name": "ឈ្មោះពេញ", "btn-signin": "ចូលគណនី", "btn-signup": "បង្កើតគណនីថ្មី",
                "view-msg-title": "ប្រអប់សារកម្សាន្ត", "view-profile-title": "ព័ត៌មានប្រវត្តិរូបផ្ទាល់ខ្លួន",
                "msg-empty": "សូមជ្រើសរើសសមាជិកដើម្បីផ្ញើសារទំនាក់ទំនងផ្ទាល់ខ្លួន។",
                "profile-empty": "សូមចូលប្រព័ន្ធដើម្បីមើលគណនីពេញលេញរបស់អ្នក។",
                "panel-members-title": "សមាជិកសកម្ម"
            }
        };

        // Sheet Navigation Engine Layout Switches
        function navigateToSheet(targetId) {
            document.querySelectorAll('.view-sheet').forEach(sheet => sheet.classList.remove('active'));
            document.querySelectorAll('.nav-pill').forEach(pill => pill.classList.remove('active'));
            
            document.getElementById(`sheet-${targetId}`).classList.add('active');
            document.getElementById(`nav-${targetId}`).classList.add('active');

            const canvas = document.getElementById('mainScrollCanvas');
            const titleEl = document.getElementById('currentViewTitle');
            
            if (targetId === 'home') {
                canvas.classList.remove('wide-layout');
                titleEl.setAttribute('data-key', 'feed-title');
                titleEl.textContent = langData[currentLang]['feed-title'];
            } else if (targetId === 'messages') {
                // Wide layout lets split panels touch screen borders cleanly
                canvas.classList.add('wide-layout');
                titleEl.setAttribute('data-key', 'view-msg-title');
                titleEl.textContent = langData[currentLang]['view-msg-title'];
            } else if (targetId === 'profile') {
                canvas.classList.remove('wide-layout');
                titleEl.setAttribute('data-key', 'view-profile-title');
                titleEl.textContent = langData[currentLang]['view-profile-title'];
            }
        }

        function switchLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if(langData[lang][key]) el.textContent = langData[lang][key];
            });
            updateProfileUIState();
        }

        function updateProfileUIState() {
            const nameEl = document.getElementById('profileNameDisplay');
            const handleEl = document.getElementById('profileHandleDisplay');
            const avatarBox = document.getElementById('userAvatarContainer');
            const guestIcon = document.getElementById('guestAvatarIcon');
            const signoutBtn = document.getElementById('btnSignout');

            const pName = document.getElementById('sheetProfileName');
            const pHandle = document.getElementById('sheetProfileHandle');
            const pAvatar = document.getElementById('sheetProfileAvatar');

            if (isLoggedIn) {
                nameEl.removeAttribute('data-key');
                handleEl.removeAttribute('data-key');
                nameEl.textContent = activeUser.name;
                handleEl.textContent = activeUser.handle;
                guestIcon.style.display = 'none';
                avatarBox.style.backgroundImage = "url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80')";
                signoutBtn.style.display = 'flex';

                pName.textContent = activeUser.name;
                pHandle.textContent = activeUser.handle;
                pAvatar.style.backgroundImage = "url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80')";
                pAvatar.innerHTML = '';
            } else {
                nameEl.setAttribute('data-key', 'user-status-guest');
                handleEl.setAttribute('data-key', 'user-action-guest');
                nameEl.textContent = langData[currentLang]['user-status-guest'];
                handleEl.textContent = langData[currentLang]['user-action-guest'];
                avatarBox.style.backgroundImage = 'none';
                guestIcon.style.display = 'block';
                signoutBtn.style.display = 'none';

                pName.textContent = currentLang === 'en' ? "Guest User" : "គណនីភ្ញៀវ";
                pHandle.textContent = '@guest';
                pAvatar.style.backgroundImage = 'none';
                pAvatar.innerHTML = '<i class="fa-solid fa-user"></i>';
            }
        }

        function handleWidgetClick() { if (!isLoggedIn) openAuthModal(); }
        function openAuthModal() { document.getElementById('authOverlay').classList.add('active'); }
        function closeAuthModal() { document.getElementById('authOverlay').classList.remove('active'); }
        function toggleAuthTab(type) {
            document.getElementById('tabSignin').classList.remove('active');
            document.getElementById('tabSignup').classList.remove('active');
            document.getElementById('formSignin').classList.remove('active');
            document.getElementById('formSignup').classList.remove('active');
            if(type === 'signin') {
                document.getElementById('tabSignin').classList.add('active');
                document.getElementById('formSignin').classList.add('active');
            } else {
                document.getElementById('tabSignup').classList.add('active');
                document.getElementById('formSignup').classList.add('active');
            }
        }
    </script>
</body>
