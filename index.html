<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra KH - Pro Social UI</title>

<style>
:root{
  --blue:#1E50FF;
  --bg:#eef2ff;
  --card:#ffffff;
  --border:#ddd;
}

*{box-sizing:border-box;font-family:Arial}

body{
  margin:0;
  display:flex;
  height:100vh;
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--blue);
  color:white;
  display:flex;
  flex-direction:column;
}

.logo{
  padding:18px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.menu{
  list-style:none;
  padding:0;
  margin:0;
}

.menu li{
  padding:14px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu li.active,
.menu li:hover{
  background:#143fd1;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
  background:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.content{
  flex:1;
  overflow:auto;
  padding:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* POST */
.post{
  border:1px solid var(--border);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.actions button{
  margin-right:6px;
  font-size:12px;
  padding:4px 8px;
}

/* CHAT */
.chat-layout{
  display:flex;
  gap:10px;
}

.users{
  width:200px;
  background:white;
  border-radius:10px;
  padding:10px;
}

.user{
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.user:hover{
  background:#f1f5ff;
}

.chat-box{
  flex:1;
  background:white;
  border-radius:10px;
  padding:10px;
  height:350px;
  overflow:auto;
}

.msg{
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  background:#dbeafe;
}

.me{background:#1E50FF;color:white;text-align:right}

.input-box{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input,textarea{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  background:var(--blue);
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  body{flex-direction:column}
  .sidebar{width:100%;flex-direction:row}
  .menu{display:flex}
  .menu li{flex:1;text-align:center}
  .chat-layout{flex-direction:column}
  .users{width:100%}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Ultra KH</div>
  <ul class="menu">
    <li class="active" onclick="show('home',this)">Home</li>
    <li onclick="show('chat',this)">Chat</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div id="title">Home</div>
</div>

<div class="content">

<!-- HOME -->
<div id="home">

<div class="card">
<h3>Create Post</h3>
<textarea id="postInput" placeholder="What's happening?"></textarea>
<button onclick="addPost()">Post</button>
</div>

<div class="card">
<h3>Feed</h3>
<div id="feed"></div>
</div>

</div>

<!-- CHAT -->
<div id="chat" style="display:none">

<div class="chat-layout">

<!-- USERS -->
<div class="users">
<h4>Online</h4>
<div id="userList"></div>
</div>

<!-- CHAT BOX -->
<div style="flex:1">

<div class="chat-box" id="chatBox"></div>

<div class="input-box">
<input id="chatInput" placeholder="Message...">
<button onclick="send()">Send</button>
</div>

</div>

</div>

</div>

</div>
</div>

<script>

let activeUser="user1";
let currentChat=null;

let users=[
  {id:"user1",name:"Sophia"},
  {id:"user2",name:"Rath"},
  {id:"user3",name:"Dara"}
];

let chats={};

function show(page,el){

  document.querySelectorAll(".menu li").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="none";

  if(page==="home"){
    document.getElementById("home").style.display="block";
    document.getElementById("title").innerText="Home";
  }

  if(page==="chat"){
    document.getElementById("chat").style.display="block";
    document.getElementById("title").innerText="Chat";
    renderUsers();
  }
}

/* POSTS */
function addPost(){
  let text=document.getElementById("postInput").value;
  if(!text)return;

  let div=document.createElement("div");
  div.className="post";

  div.innerHTML=`
    <b>Admin</b>
    <p>${text}</p>
    <div class="actions">
      <button onclick="likePost(this)">👍 Like</button>
      <button onclick="commentPost(this)">💬 Comment</button>
      <button onclick="sharePost()">🔗 Share</button>
      <button onclick="this.parentElement.parentElement.remove()">🗑 Delete</button>
    </div>
  `;

  document.getElementById("feed").prepend(div);
  document.getElementById("postInput").value="";
}

function likePost(btn){
  btn.innerText="👍 Liked";
}

/* CHAT USERS */
function renderUsers(){
  let box=document.getElementById("userList");
  box.innerHTML="";
  users.forEach(u=>{
    let d=document.createElement("div");
    d.className="user";
    d.innerText=u.name;
    d.onclick=()=>openChat(u.id,u.name);
    box.appendChild(d);
  });
}

function openChat(id,name){
  currentChat=id;
  renderChat();
}

function send(){
  let text=document.getElementById("chatInput").value;
  if(!text||!currentChat)return;

  if(!chats[currentChat])chats[currentChat]=[];

  chats[currentChat].push({
    from:"me",
    text:text
  });

  document.getElementById("chatInput").value="";
  renderChat();
}

function renderChat(){
  let box=document.getElementById("chatBox");
  box.innerHTML="";

  let msgs=chats[currentChat]||[];

  msgs.forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="msg "+(m.from==="me"?"me":"");

    d.innerHTML=`
      ${m.text}
      <div>
        <button onclick="reply('${m.text}')">↩ Reply</button>
        <button onclick="forward('${m.text}')">➡ Forward</button>
        <button onclick="likeMsg(this)">❤️</button>
        <button onclick="deleteMsg(${i})">Delete</button>
        <button onclick="voice()">🎤 Voice</button>
      </div>
    `;

    box.appendChild(d);
  });

  box.scrollTop=box.scrollHeight;
}

function reply(t){
  document.getElementById("chatInput").value="Reply: "+t+" ";
}

function forward(t){
  alert("Forwarded: "+t);
}

function likeMsg(btn){
  btn.innerText="❤️";
}

function deleteMsg(i){
  chats[currentChat].splice(i,1);
  renderChat();
}

function voice(){
  alert("Voice feature simulated 🎤");
}

function sharePost(){
  alert("Post shared!");
}

</script>

</body>
</html>
